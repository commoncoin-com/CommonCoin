global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Monitor the prometheus instance itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitor the CommonCoin Seed Node system metrics
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100'] # Assumes node_exporter is running on the node host

  # Monitor the Mining Pool metrics (using NOMP http metrics or custom collector)
  - job_name: 'mining_pool'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080']
